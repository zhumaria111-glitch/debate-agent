name: Deploy to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Collect only Streamlit app files (exclude personal-page with binary images)
          mkdir -p /tmp/hf-push
          cp -r app.py src/ requirements.txt data/ docs/ .streamlit/ .gitignore README.md /tmp/hf-push/ 2>/dev/null

          cd /tmp/hf-push
          git init
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git commit -m "deploy $(date +%Y%m%d%H%M%S)" || true

          git remote add hf https://Mariazhu:${HF_TOKEN}@huggingface.co/spaces/Mariazhu/debate-agent.git
          git push hf main --force
