name: Deploy Personal Page to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'personal-page/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Build
        working-directory: personal-page
        run: |
          npm install
          npm run build

      - name: Deploy
        run: |
          set -e
          cd /tmp
          git clone --branch gh-pages --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git pages 2>/dev/null || git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git pages && cd pages && git checkout --orphan gh-pages && git rm -rf .
          cd /tmp/pages
          cp -r ${{ github.workspace }}/personal-page/dist/* .
          touch .nojekyll
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git diff --staged --quiet || git commit -m "deploy $(date +%Y%m%d%H%M%S)"
          git push origin gh-pages
